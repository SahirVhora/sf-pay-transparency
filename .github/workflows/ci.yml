name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile Python files
        run: python -m py_compile backend_server.py proxy_server.py scripts/smoke_test.py

      - name: Run demo-mode smoke tests
        run: python scripts/smoke_test.py
