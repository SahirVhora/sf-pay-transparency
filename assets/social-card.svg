<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SAP SuccessFactors Pay Transparency Readiness Checker</title>
  <desc id="desc">A social preview card for an EU Pay Transparency Directive readiness prototype for SAP SuccessFactors teams.</desc>
  <defs>
