      <stop offset="0" stop-color="#081018"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#0d1f1c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5d779"/>
      <stop offset="1" stop-color="#c8a84e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="562" rx="28" fill="none" stroke="#2b3440" stroke-width="2"/>
